name: Sync upstream (damonto/uicc-go)

on:
  schedule:
    - cron: '23 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/damonto/uicc-go.git 2>/dev/null || true

      - name: Fetch and merge upstream
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch upstream main
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "已是最新，无需同步"
            exit 0
          fi

          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "上游有 ${BEHIND} 个新提交，开始合并..."

          git merge upstream/main --no-edit -m "sync: 自动同步上游 damonto/uicc-go (${BEHIND} 个新提交)"
          git push origin main

          echo "✅ 同步完成"
